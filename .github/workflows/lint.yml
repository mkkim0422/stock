name: lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ruff-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: ruff
        run: ruff check src/ tests/
      - name: mypy
        run: mypy src/ || true
